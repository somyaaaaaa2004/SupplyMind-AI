version: "3.9"

# SupplyMind AI – Development Docker Compose
# Starts: MongoDB, Redis, API server, Frontend
# Usage: docker-compose up -d

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: supplymind_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}
      MONGO_INITDB_DATABASE: supplymind_dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      # Uncomment to run a DB init script on first start:
      # - ./init/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - supplymind_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: supplymind_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - supplymind_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: development
    container_name: supplymind_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-devpassword}@mongodb:27017/supplymind_dev?authSource=admin
      DATABASE_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-devpassword}@mongodb:27017/supplymind_dev?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ../backend/src:/app/src
      - ../backend/prisma:/app/prisma
      - ../backend/uploads:/app/uploads
      - ../backend/logs:/app/logs
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplymind_network

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: development
    container_name: supplymind_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_APP_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - supplymind_network

  # ── Mongo Express (dev UI) ─────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: supplymind_mongo_ui
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-devpassword}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpass
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - supplymind_network
    profiles:
      - tools

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  supplymind_network:
    driver: bridge
