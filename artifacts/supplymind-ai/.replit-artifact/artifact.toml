kind = "web"
previewPath = "/"
title = "AUTONOMOUS PROCUREMENT AND LOGISTICS BRAIN"
version = "1.0.0"
id = "artifacts/supplymind-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21311

[services.development]
run = "pnpm --filter @workspace/supplymind-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supplymind-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/supplymind-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21311"
BASE_PATH = "/"
